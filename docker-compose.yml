services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER:     ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - internal

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DJANGO_SECRET_KEY:    ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY is required}
      DJANGO_DEBUG:         ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_TIME_ZONE:     ${DJANGO_TIME_ZONE:-Asia/Amman}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-True}
      DJANGO_SECURE_HSTS_SECONDS: ${DJANGO_SECURE_HSTS_SECONDS:-31536000}
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: ${DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS:-True}
      DJANGO_SECURE_HSTS_PRELOAD: ${DJANGO_SECURE_HSTS_PRELOAD:-True}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-True}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-True}
      POSTGRES_DB:          ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER:        ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD:    ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_HOST:        db
      POSTGRES_PORT:        "5432"
      FILE_UPLOAD_MAX_SIZE: ${FILE_UPLOAD_MAX_SIZE:-5242880}
      REDIS_URL:            ${REDIS_URL:-}
      DJANGO_ADMIN_EMAIL:    ${DJANGO_ADMIN_EMAIL:-}
      DJANGO_ADMIN_PASSWORD: ${DJANGO_ADMIN_PASSWORD:-}
      DJANGO_ADMIN_NAME:     ${DJANGO_ADMIN_NAME:-Admin}
      DJANGO_SEED_INITIAL_DATA: ${DJANGO_SEED_INITIAL_DATA:-False}
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import Request, urlopen; import sys; req = Request('http://127.0.0.1:8000/api/health/', headers={'Host': 'localhost', 'X-Forwarded-Proto': 'https'}); sys.exit(0 if urlopen(req).status == 200 else 1)\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 180s
    networks:
      - internal
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    expose:
     - "80"
    volumes:
      - backend_media:/var/www/media:ro
      - backend_static:/var/www/static:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  backend_media:
  backend_static:
